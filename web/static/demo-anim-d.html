<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMR-ML 策略原理 · 动画演示</title>
<link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAFAF7;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; color: #2D2A26;
    padding: 20px 24px;
  }

  /* ===== Top bar ===== */
  .top-bar {
    width: 100%; max-width: 975px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .top-bar h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.05rem; color: #2D2A26; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .back-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 16px; border-radius: 14px;
    border: 1px solid #E8E4DE; background: transparent;
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    color: #8B8680; cursor: pointer; transition: all 0.25s;
  }
  .back-btn:hover { border-color: #3D5A80; color: #3D5A80; }
  .back-btn svg { width: 12px; height: 12px; }

  /* ===== Tabs ===== */
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .tab {
    padding: 7px 18px; border-radius: 16px;
    border: 1px solid #E8E4DE; background: transparent;
    font-family: 'Inter', sans-serif; font-size: 0.72rem;
    color: #8B8680; cursor: pointer; transition: all 0.25s;
    white-space: nowrap;
  }
  .tab:hover { border-color: #B8B2A8; color: #2D2A26; }
  .tab.active { border-color: #3D5A80; color: #3D5A80; background: rgba(61,90,128,0.04); }
  .tab.active-red { border-color: #C0625F; color: #C0625F; background: rgba(192,98,95,0.04); }

  /* ===== Container ===== */
  .anim-wrap { width: 100%; max-width: 975px; }
  .scene { display: none; }
  .scene.visible { display: block; }
  svg { width: 100%; height: auto; overflow: visible; }

  /* ===== Shared keyframes ===== */
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fade-in { to { opacity: 1; } }
  @keyframes fade-up { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }
  @keyframes dot-on { to { opacity: 1; } }
  @keyframes dot-path { 0%{offset-distance:0%} 100%{offset-distance:100%} }
  @keyframes dot-off { to { opacity: 0; } }
  @keyframes glow-on { to { opacity: 0.12; } }
  @keyframes badge-pop { 0%{opacity:0;transform:scale(0.6)} 100%{opacity:1;transform:scale(1)} }
  @keyframes sweep-rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes crosshair-in { 0%{opacity:0} 40%{opacity:0.6} 60%{opacity:0.25} 100%{opacity:0.45} }
  @keyframes center-pulse { 0%{opacity:0;r:1} 50%{opacity:1;r:3} 100%{opacity:1;r:2} }

  .line-draw { stroke-dasharray: 600; stroke-dashoffset: 600; }
  .flow-draw { stroke-dasharray: 300; stroke-dashoffset: 300; }
  .ext-draw { stroke-dasharray: 400; stroke-dashoffset: 400; }

  /* ============================== SCENE 1 ============================== */
  .playing .s1-cash    { animation: draw 4.5s ease-out .4s forwards; }
  .playing .s1-line300 { animation: draw 4.5s cubic-bezier(0.35,0,0.15,1) 0.6s forwards; }
  .playing .s1-line1000{ animation: draw 4.5s cubic-bezier(0.35,0,0.15,1) 0.8s forwards; }
  .s1-tracer { opacity:0; }
  .playing .s1-tracer  { animation: dot-on .01s .8s forwards, dot-path 4.5s cubic-bezier(0.35,0,0.15,1) .8s forwards, dot-off .5s 5s forwards; }
  .s1-ma { stroke-dasharray:400; stroke-dashoffset:400; opacity:0; }
  .playing .s1-ma      { animation: draw 3s ease-out 3.2s forwards, fade-in .5s ease-out 3.2s forwards; }
  .s1-malabel { opacity:0; } .playing .s1-malabel { animation: fade-in .5s ease-out 4s forwards; }
  .s1-momwin { opacity:0; } .playing .s1-momwin { animation: fade-up .7s ease-out 3s forwards; }
  .s1-glow { stroke-dasharray:600; stroke-dashoffset:600; opacity:0; }
  .playing .s1-glow    { animation: draw 2s ease-out 5.8s forwards, glow-on .8s ease-out 5.8s forwards; }
  .s1-winner { opacity:0; } .playing .s1-winner { animation: fade-up .8s ease-out 6.2s forwards; }
  .s1-loser  { opacity:0; } .playing .s1-loser  { animation: fade-in .6s ease-out 6.4s forwards; }
  .playing .s1-flow    { animation: draw 2s cubic-bezier(0.35,0,0.15,1) 7s forwards; }
  .s1-flowdot { opacity:0; }
  .playing .s1-flowdot { animation: dot-on .01s 7s forwards, dot-path 2s cubic-bezier(0.35,0,0.15,1) 7s forwards, dot-off .4s 8.6s forwards; }

  .s1-ml { opacity:0; } .playing .s1-ml { animation: fade-in .8s ease-out 8.8s forwards; }
  .s1-ring { stroke-dasharray:100; stroke-dashoffset:100; } .playing .s1-ring { animation: draw 1.4s ease-out 9s forwards; }
  .s1-ring2 { stroke-dasharray:57; stroke-dashoffset:57; } .playing .s1-ring2 { animation: draw 1s ease-out 9.4s forwards; }
  .s1-sweep { opacity:0; transform-origin:490px 130px; } .playing .s1-sweep { animation: dot-on .3s 9.8s forwards, sweep-rotate 2.2s linear 9.8s forwards; }
  .s1-cross { opacity:0; } .playing .s1-cross { animation: crosshair-in .4s ease-out 11.2s forwards; }
  .s1-center { opacity:0; } .playing .s1-center { animation: center-pulse .6s ease-out 11.4s forwards; }
  .s1-mllabel { opacity:0; } .playing .s1-mllabel { animation: fade-in .6s ease-out 9s forwards; }
  /* Random forest tree icons */
  .s1-rf { opacity:0; } .playing .s1-rf { animation: fade-up .6s ease-out 11.6s forwards; }
  @keyframes tree-vote { 0%{opacity:0;transform:translateY(3px)} 100%{opacity:1;transform:translateY(0)} }
  .s1-tree { opacity:0; }
  .playing .s1-tree1 { animation: tree-vote .3s ease-out 11.8s forwards; }
  .playing .s1-tree2 { animation: tree-vote .3s ease-out 12s forwards; }
  .playing .s1-tree3 { animation: tree-vote .3s ease-out 12.2s forwards; }
  .playing .s1-tree4 { animation: tree-vote .3s ease-out 12.4s forwards; }
  .playing .s1-tree5 { animation: tree-vote .3s ease-out 12.6s forwards; }
  .s1-vote { opacity:0; } .playing .s1-vote { animation: fade-up .5s ease-out 13s forwards; }
  .s1-thresh { opacity:0; } .playing .s1-thresh { animation: fade-up .7s ease-out 13.5s forwards; }
  .s1-gdot { opacity:0; } .playing .s1-gdot { animation: fade-up .5s ease-out 14.2s forwards; }
  .s1-risk { opacity:0; } .playing .s1-risk { animation: fade-up .6s ease-out 14.5s forwards; }
  .playing .s1-resultline { animation: draw 1.2s ease-out 15s forwards; }
  .s1-badge { opacity:0; } .playing .s1-badge { animation: badge-pop .8s cubic-bezier(0.34,1.56,0.64,1) 15.8s forwards; }
  .s1-step { opacity:0; }
  .playing .s1-st1 { animation: fade-in .5s ease-out .3s forwards; }
  .playing .s1-st2 { animation: fade-in .5s ease-out 5.8s forwards; }
  .playing .s1-st3 { animation: fade-in .5s ease-out 8.8s forwards; }
  .playing .s1-st4 { animation: fade-in .5s ease-out 15.8s forwards; }

  /* ============================== SCENE 2 ============================== */
  .playing .s2-cash    { animation: draw 4.5s ease-out .4s forwards; }
  .playing .s2-line300 { animation: draw 4.5s cubic-bezier(0.35,0,0.15,1) 0.6s forwards; }
  .playing .s2-line1000{ animation: draw 4.5s cubic-bezier(0.35,0,0.15,1) 0.9s forwards; }
  .s2-zone { opacity:0; } .playing .s2-zone { animation: fade-in .8s ease-out 5.2s forwards; }
  .s2-cashext { opacity:0; } .playing .s2-cashext { animation: fade-in .3s ease-out 6s forwards; }
  .playing .s2-cashextline { animation: draw 2.5s ease-out 6s forwards; }
  .s2-arrow { opacity:0; } .playing .s2-arrow { animation: fade-up .6s ease-out 7s forwards; }
  .s2-badge { opacity:0; } .playing .s2-badge { animation: badge-pop .8s cubic-bezier(0.34,1.56,0.64,1) 7.8s forwards; }
  .s2-step { opacity:0; }
  .playing .s2-st1 { animation: fade-in .5s ease-out .3s forwards; }
  .playing .s2-st2 { animation: fade-in .5s ease-out 5.2s forwards; }
  .playing .s2-st3 { animation: fade-in .5s ease-out 7.8s forwards; }

  /* ============================== SCENE 3 ============================== */
  .playing .s3-cash    { animation: draw 4.5s ease-out .4s forwards; }
  .playing .s3-line300 { animation: draw 4.5s cubic-bezier(0.35,0,0.15,1) 0.6s forwards; }
  .playing .s3-line1000{ animation: draw 4.5s cubic-bezier(0.35,0,0.15,1) 0.8s forwards; }
  .s3-tracer { opacity:0; }
  .playing .s3-tracer  { animation: dot-on .01s .8s forwards, dot-path 4.5s cubic-bezier(0.35,0,0.15,1) .8s forwards, dot-off .5s 5s forwards; }
  .s3-glow { stroke-dasharray:600; stroke-dashoffset:600; opacity:0; }
  .playing .s3-glow    { animation: draw 2s ease-out 5.8s forwards, glow-on .8s ease-out 5.8s forwards; }
  .s3-winner { opacity:0; } .playing .s3-winner { animation: fade-up .8s ease-out 6.2s forwards; }
  .playing .s3-flow    { animation: draw 2s cubic-bezier(0.35,0,0.15,1) 7.2s forwards; }
  .s3-flowdot { opacity:0; }
  .playing .s3-flowdot { animation: dot-on .01s 7.2s forwards, dot-path 2s cubic-bezier(0.35,0,0.15,1) 7.2s forwards, dot-off .4s 8.8s forwards; }
  .s3-ml { opacity:0; } .playing .s3-ml { animation: fade-in .8s ease-out 9s forwards; }
  .s3-ring { stroke-dasharray:100; stroke-dashoffset:100; } .playing .s3-ring { animation: draw 1.4s ease-out 9.3s forwards; }
  .s3-ring2 { stroke-dasharray:57; stroke-dashoffset:57; } .playing .s3-ring2 { animation: draw 1s ease-out 9.6s forwards; }
  .s3-sweep { opacity:0; transform-origin:480px 155px; } .playing .s3-sweep { animation: dot-on .3s 10s forwards, sweep-rotate 2.2s linear 10s forwards; }
  .s3-cross { opacity:0; } .playing .s3-cross { animation: crosshair-in .4s ease-out 11.4s forwards; }
  .s3-center { opacity:0; } .playing .s3-center { animation: center-pulse .6s ease-out 11.6s forwards; }
  .s3-mllabel { opacity:0; } .playing .s3-mllabel { animation: fade-in .6s ease-out 9.3s forwards; }
  .s3-risk { opacity:0; } .playing .s3-risk { animation: fade-up .6s ease-out 12s forwards; }
  @keyframes block-x { 0%{stroke-dashoffset:30} 100%{stroke-dashoffset:0} }
  @keyframes block-shake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-3px)} 30%{transform:translateX(3px)} 45%{transform:translateX(-2px)} 60%{transform:translateX(2px)} }
  .s3-block { opacity:0; } .playing .s3-block { animation: fade-in .3s ease-out 12.3s forwards, block-shake .5s ease-out 12.3s forwards; }
  .s3-blockx { stroke-dasharray:30; stroke-dashoffset:30; } .playing .s3-blockx { animation: block-x .4s ease-out 12.5s forwards; }
  .s3-cashext { opacity:0; } .playing .s3-cashext { animation: fade-in .3s ease-out 12.8s forwards; }
  .playing .s3-cashextline { animation: draw 2s ease-out 12.8s forwards; }
  .playing .s3-resultline { animation: draw 1.2s ease-out 13.5s forwards; }
  .s3-badge { opacity:0; } .playing .s3-badge { animation: badge-pop .8s cubic-bezier(0.34,1.56,0.64,1) 14.2s forwards; }
  .s3-step { opacity:0; }
  .playing .s3-st1 { animation: fade-in .5s ease-out .3s forwards; }
  .playing .s3-st2 { animation: fade-in .5s ease-out 5.8s forwards; }
  .playing .s3-st3 { animation: fade-in .5s ease-out 9s forwards; }
  .playing .s3-st4 { animation: fade-in .5s ease-out 14.2s forwards; }

  /* ===== Bottom ===== */
  .legend {
    margin-top: 16px; display: flex; gap: 28px;
    font-size: 0.72rem; color: #8B8680;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .sw { width: 18px; height: 2px; border-radius: 1px; }
  .legend .sw-dash { border-top: 1.5px dashed; width: 18px; height: 0; }
  .replay-btn {
    margin-top: 16px; padding: 7px 24px;
    border: 1px solid #E8E4DE; border-radius: 16px;
    background: transparent; color: #8B8680;
    font-size: 0.72rem; cursor: pointer; transition: all 0.25s;
    font-family: 'Inter', sans-serif;
  }
  .replay-btn:hover { border-color: #3D5A80; color: #3D5A80; }
</style>
</head>
<body>

  <div class="top-bar">
    <h2>DMR-ML 策略原理</h2>
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
      返回
    </button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showScene(0)">情况一 · 正常买入</button>
    <button class="tab" onclick="showScene(1)">情况二 · 两者皆弱</button>
    <button class="tab" onclick="showScene(2)">情况三 · ML 拦截</button>
  </div>

  <div class="anim-wrap">

    <!-- ==================== SCENE 1 ==================== -->
    <div class="scene visible" id="scene-0">
      <svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="g1"><feGaussianBlur stdDeviation="5"/></filter>
          <linearGradient id="sw1" gradientUnits="userSpaceOnUse" x1="490" y1="130" x2="490" y2="114">
            <stop offset="0%" stop-color="#C0625F" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#C0625F" stop-opacity="0"/>
          </linearGradient>
        </defs>

        <!-- ======= LEFT: CHART AREA (x:70-380) ======= -->
        <g opacity="0.18">
          <line x1="70" y1="80" x2="380" y2="80" stroke="#D8D4CE" stroke-width="0.5" stroke-dasharray="3,4"/>
          <line x1="70" y1="120" x2="380" y2="120" stroke="#D8D4CE" stroke-width="0.5" stroke-dasharray="3,4"/>
          <line x1="70" y1="160" x2="380" y2="160" stroke="#D8D4CE" stroke-width="0.5" stroke-dasharray="3,4"/>
          <line x1="70" y1="200" x2="380" y2="200" stroke="#D8D4CE" stroke-width="0.5" stroke-dasharray="3,4"/>
          <line x1="70" y1="45" x2="70" y2="220" stroke="#D8D4CE" stroke-width="0.6"/>
          <line x1="70" y1="220" x2="385" y2="220" stroke="#D8D4CE" stroke-width="0.6"/>
        </g>
        <text x="64" y="84" text-anchor="end" font-size="8" fill="#B8B2A8">强</text>
        <text x="64" y="204" text-anchor="end" font-size="8" fill="#B8B2A8">弱</text>

        <!-- Step 1 -->
        <g class="s1-step s1-st1">
          <text x="74" y="36" font-size="10.5" fill="#3D5A80" font-weight="500">① 动量比较</text>
        </g>

        <!-- Cash baseline -->
        <path class="line-draw s1-cash" d="M 70 160 L 380 160"
              stroke="#5A8A6A" stroke-width="1" fill="none" stroke-dasharray="5,4" opacity="0.35"/>
        <text x="385" y="157" font-size="8" fill="#5A8A6A" opacity="0.55">现金基准</text>

        <!-- 14日 MA line -->
        <path class="s1-ma"
              d="M 70 170 C 110 158, 150 135, 190 118 C 230 102, 270 106, 310 95 C 340 88, 360 92, 380 85"
              stroke="#3D5A80" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>

        <!-- CSI 300 -->
        <path class="line-draw s1-line300"
              d="M 70 168 C 110 162, 140 152, 175 155 C 210 160, 250 145, 290 140 C 320 136, 350 148, 380 150"
              stroke="#C8C3BB" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- CSI 1000 -->
        <path class="line-draw s1-line1000"
              d="M 70 162 C 110 145, 145 122, 185 105 C 225 88, 260 98, 300 82 C 335 70, 360 76, 380 68"
              stroke="#3D5A80" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Glow -->
        <path class="s1-glow"
              d="M 70 162 C 110 145, 145 122, 185 105 C 225 88, 260 98, 300 82 C 335 70, 360 76, 380 68"
              stroke="#3D5A80" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#g1)"/>

        <!-- Tracer -->
        <circle class="s1-tracer" r="3.5" fill="#3D5A80"
                style="offset-path:path('M 70 162 C 110 145, 145 122, 185 105 C 225 88, 260 98, 300 82 C 335 70, 360 76, 380 68');offset-rotate:0deg"/>

        <!-- MA label (positioned below the MA line, not overlapping) -->
        <g class="s1-malabel">
          <line x1="200" y1="118" x2="200" y2="132" stroke="#3D5A80" stroke-width="0.4" opacity="0.3"/>
          <text x="200" y="142" text-anchor="middle" font-size="7.5" fill="#3D5A80" opacity="0.5">14 日均线</text>
        </g>

        <!-- Momentum window bracket -->
        <g class="s1-momwin">
          <line x1="200" y1="226" x2="200" y2="233" stroke="#3D5A80" stroke-width="0.6" opacity="0.4"/>
          <line x1="380" y1="226" x2="380" y2="233" stroke="#3D5A80" stroke-width="0.6" opacity="0.4"/>
          <line x1="200" y1="233" x2="380" y2="233" stroke="#3D5A80" stroke-width="0.6" opacity="0.4"/>
          <text x="290" y="247" text-anchor="middle" font-size="8.5" fill="#3D5A80" font-weight="500">动量窗口 20 日</text>
          <text x="290" y="260" text-anchor="middle" font-size="7.5" fill="#B8B2A8">比较近 20 个交易日的累计收益率，谁涨得多持谁</text>
        </g>

        <!-- Step 2 -->
        <g class="s1-step s1-st2">
          <text x="225" y="282" text-anchor="middle" font-size="10.5" fill="#3D5A80" font-weight="500">② 中证1000 胜出</text>
          <text x="225" y="296" text-anchor="middle" font-size="8" fill="#B8B2A8">近 20 日累计收益率更高</text>
        </g>

        <!-- Winner / Loser tags -->
        <g class="s1-winner">
          <rect x="310" y="48" width="72" height="19" rx="9.5" fill="rgba(61,90,128,0.06)" stroke="#3D5A80" stroke-width="0.6"/>
          <text x="346" y="61" text-anchor="middle" font-size="9" fill="#3D5A80" font-weight="500">中证1000 ✓</text>
        </g>
        <text class="s1-loser" x="350" y="162" font-size="8.5" fill="#C8C3BB">沪深300</text>

        <!-- ======= MIDDLE: Flow to ML (single line, no extension) ======= -->
        <path class="flow-draw s1-flow"
              d="M 380 68 C 410 68, 435 72, 455 80 C 470 88, 482 105, 488 128"
              stroke="#3D5A80" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>
        <circle class="s1-flowdot" r="2.5" fill="#3D5A80"
                style="offset-path:path('M 380 68 C 410 68, 435 72, 455 80 C 470 88, 482 105, 488 128');offset-rotate:0deg"/>

        <!-- ======= ML Scanner at (490, 130), r=16/9 ======= -->
        <g class="s1-ml">
          <circle class="s1-ring" cx="490" cy="130" r="16" fill="none" stroke="#C0625F" stroke-width="0.9" opacity="0.55"/>
          <circle class="s1-ring2" cx="490" cy="130" r="9" fill="none" stroke="#C0625F" stroke-width="0.5" opacity="0.3"/>
          <line x1="490" y1="112.5" x2="490" y2="116" stroke="#C0625F" stroke-width="0.5" opacity="0.35"/>
          <line x1="490" y1="144" x2="490" y2="147.5" stroke="#C0625F" stroke-width="0.5" opacity="0.35"/>
          <line x1="472.5" y1="130" x2="476" y2="130" stroke="#C0625F" stroke-width="0.5" opacity="0.35"/>
          <line x1="504" y1="130" x2="507.5" y2="130" stroke="#C0625F" stroke-width="0.5" opacity="0.35"/>
          <g class="s1-cross">
            <line x1="484" y1="130" x2="487" y2="130" stroke="#C0625F" stroke-width="0.5"/>
            <line x1="493" y1="130" x2="496" y2="130" stroke="#C0625F" stroke-width="0.5"/>
            <line x1="490" y1="124" x2="490" y2="127" stroke="#C0625F" stroke-width="0.5"/>
            <line x1="490" y1="133" x2="490" y2="136" stroke="#C0625F" stroke-width="0.5"/>
          </g>
          <path class="s1-sweep" d="M 490 130 L 490 114 A 16 16 0 0 1 503 123 Z" fill="url(#sw1)"/>
          <circle class="s1-center" cx="490" cy="130" r="2" fill="#C0625F"/>
        </g>

        <!-- ML label (spaced below scanner) -->
        <g class="s1-mllabel">
          <text x="490" y="160" text-anchor="middle" font-size="9.5" fill="#C0625F" font-weight="500">ML 风险扫描</text>
        </g>

        <!-- ======= Random Forest explanation (below ML label) ======= -->
        <g class="s1-rf">
          <text x="490" y="178" text-anchor="middle" font-size="8" fill="#B8B2A8">100 棵决策树各自判断，多数投票决定结果</text>
        </g>
        <!-- 5 mini tree icons (spaced apart) -->
        <g transform="translate(415, 188)">
          <g transform="translate(0, 0)"><g class="s1-tree s1-tree1">
            <polygon points="6,0 0,9 12,9" fill="#5A8A6A" opacity="0.5"/>

<script>
let currentScene = 0;
const scenes = document.querySelectorAll('.scene');
const tabs = document.querySelectorAll('.tab');

function showScene(idx) {
  currentScene = idx;
  scenes.forEach(s => { s.classList.remove('visible','playing'); });
  tabs.forEach(t => { t.classList.remove('active','active-red'); });
  scenes[idx].classList.add('visible');
  tabs[idx].classList.add(idx === 2 ? 'active-red' : 'active');
  void scenes[idx].offsetWidth;
  scenes[idx].classList.add('playing');
}

function replayCurrentScene() {
  const s = scenes[currentScene];
  s.classList.remove('playing');
  void s.offsetWidth;
  s.classList.add('playing');
}
